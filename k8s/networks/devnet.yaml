apiVersion: lux.network/v1alpha1
kind: LuxNetwork
metadata:
  name: luxd
  namespace: lux-devnet
spec:
  networkId: 3
  validators: 5
  adoptExisting: true
  genesisConfigMap: luxd-genesis

  image:
    tag: v1.23.23

  ports:
    http: 9650
    staking: 9651

  consensus:
    sybilProtectionEnabled: false

  staking:
    secretName: luxd-staking
    kms:
      hostApi: https://kms.lux.network/api
      projectSlug: lux-infra
      envSlug: devnet
      secretsPath: /staking
      resyncInterval: 300
      auth:
        credentialsSecret: universal-auth-credentials
        credentialsNamespace: lux-system

  # Seed restore from Hanzo S3 snapshot
  seedRestore:
    enabled: true
    sourceType: ObjectStore
    objectStoreUrl: "https://s3.lux.network/lux-snapshots/devnet/devnet-node0-full.tar.gz"

  # Automated snapshot schedule (hourly to Hanzo S3 via s3.lux.network)
  snapshotSchedule:
    enabled: true
    intervalSeconds: 3600
    objectStoreEndpoint: "https://s3.lux.network"
    bucket: lux-snapshots
    prefix: devnet
    accessKey: hanzo
    secretKeyRef: hanzo-s3-secret
    sourceNodeIndex: 0
    includeRlpExports: true
    maxRetained: 5

  startupGate:
    onTimeout: StartAnyway
    timeoutSeconds: 30

  chainTracking:
    trackAllChains: true

  # EVM chains (C-chain always included, plus subnet chains)
  chains:
    - blockchainId: "2caKCdNop9C4oAPR1kYihN53HeSRDXD3JyMKS7ntfcpQYucmii"
      alias: zoo
      trackingId: "2fH7asshEiEQvvtGijkYeP6Xo7yhswrEqDsdrjLkMAjkgMGjiX"
    - blockchainId: "tecXMucYDxwN65mebPE6cvQ9GynG6Y5WEvwGFsY3xVDWHxiqT"
      alias: hanzo
      trackingId: "25dBp99WA9mosjtQztswkpSyo4EeXt33Wz4FzsGHgyZvPQ1LZ"
    - blockchainId: "213ZsFLRCBSmrii4huQqa6S3SxYPP8ec6dPEn6ad4CtLk3RdXp"
      alias: spc
      trackingId: "2g8raSjc4w4KiUHJuAHT3cFyGBBwkM7gWEWuQiLYn9BPzWw4S"
    - blockchainId: "MEGAgimfcodi7QaqCruFpTkNM6fqu7ZduLmWJJjGQwUg8uDPJ"
      alias: pars
      trackingId: "2VwLcANTM8QvS656K9YsiZEGFXn3MRk2cA5pG3Q4DaiwZPt4tb"

  # Platform upgrade config
  upgradeConfig:
    durangoTimestamp: 0
    etnaTimestamp: 0
    fortunaTimestamp: 0
    graniteTimestamp: 0

  # EVM chain upgrade config with all precompile activations
  chainUpgradeConfig:
    networkUpgradeOverrides:
      durangoTimestamp: 0
      etnaTimestamp: 0
      fortunaTimestamp: 0
      graniteTimestamp: 0
    precompileUpgrades:
      - aiMiningConfig: {blockTimestamp: 0}
      - blake3Config: {blockTimestamp: 0}
      - cggmp21Verify: {blockTimestamp: 0}
      - deadZeroConfig: {blockTimestamp: 0}
      - deadConfig: {blockTimestamp: 0}
      - deadFullConfig: {blockTimestamp: 0}
      - dexConfig: {blockTimestamp: 0}
      - eciesConfig: {blockTimestamp: 0}
      - fheConfig: {blockTimestamp: 0}
      - frostVerify: {blockTimestamp: 0}
      - graphConfig: {blockTimestamp: 0}
      - hpkeConfig: {blockTimestamp: 0}
      - mldsaVerify: {blockTimestamp: 0}
      - mlkemConfig: {blockTimestamp: 0}
      - pqcryptoConfig: {blockTimestamp: 0}
      - ringConfig: {blockTimestamp: 0}
      - ringtailThreshold: {blockTimestamp: 0}
      - slhdsaVerify: {blockTimestamp: 0}
      - zkConfig: {blockTimestamp: 0}
