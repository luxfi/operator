# LuxIndexer CRs for devnet (5 chains)
# Namespace: lux-devnet
# NetworkRef: luxd (the LuxNetwork CR in lux-devnet)
---
apiVersion: lux.network/v1alpha1
kind: LuxIndexer
metadata:
  name: indexer-c
  namespace: lux-devnet
  labels:
    app.kubernetes.io/part-of: lux-network
    lux.network/network: devnet
    lux.network/chain: c-chain
spec:
  networkRef: luxd
  chainAlias: "C"
  chainId: 96370
  image:
    repository: registry.digitalocean.com/hanzo/lux-indexer
    tag: v0.1.0
  database:
    managed: true
    storageSize: "20Gi"
    storageClass: do-block-storage
  port: 4000
  replicas: 1
  traceEnabled: true
  contractVerification: true
  pollInterval: 2
  storage:
    size: "10Gi"
    storageClass: do-block-storage
